<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign Up | Storyboard Artist</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&family=Space+Grotesk:wght@700;800&display=swap" rel="stylesheet">
    
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link rel="stylesheet" href="assets/css/style.css">
<link rel="icon" type="image/svg+xml" href="assets/img/favicon.svg">
</head>
<body class="auth-page">
    <div class="auth-nav">
        <button class="theme-toggle rtl-toggle-btn">RTL</button>
        <button class="theme-toggle theme-toggle-btn">☀️</button>
    </div>

    <main class="auth-container">
        <div class="auth-card">
            <div class="text-center mb-4">
                <a href="index.html" class="logo"><i class="fas fa-clapperboard me-2"></i>ARTIST_X</a>
            </div>
            <h2 class="mb-4 text-center">REQUEST ACCESS</h2>
            <p class="text-muted mb-5 text-center">Register your studio for project tracking and sequence reviews.</p>
            
            <form action="dashboard.html">
                <div class="form-group">
                    <label>Studio Name</label>
                    <input type="text" class="form-control" placeholder=" " required>
                </div>
                <div class="form-group">
                    <label>Work Email</label>
                    <input type="email" class="form-control" placeholder=" " required>
                </div>
                <div class="form-group">
                    <label>Create Password</label>
                    <div class="password-wrapper">
                        <input type="password" class="form-control" placeholder=" " required>
                        <span class="toggle-password">
                            <i class="fas fa-eye"></i>
                        </span>
                    </div>
                </div>
                <div class="form-group">
                    <label>Confirm Password</label>
                    <div class="password-wrapper">
                        <input type="password" class="form-control" placeholder=" " required>
                        <span class="toggle-password">
                            <i class="fas fa-eye"></i>
                        </span>
                    </div>
                </div>
                <div class="form-check mb-4 d-flex align-items-start gap-2">
                    <input type="checkbox" class="form-check-input mt-1" id="terms" required
                        style="width: 18px; height: 18px; cursor: pointer; accent-color: var(--accent); background-color: transparent; border-color: var(--border-color);">
                    <label class="form-check-label small text-muted" for="terms" style="cursor: pointer; text-transform: none;">
                        I agree to the <a href="#" class="text-accent">Terms & Conditions</a> and <a href="#"
                            class="text-accent">Privacy Policy</a>
                    </label>
                </div>
                
                <button type="submit" class="btn btn-primary w-100 mb-4 mt-2">Create Account</button>

                <div class="divider d-flex align-items-center my-4">
                    <hr class="flex-grow-1 border-secondary opacity-25">
                    <span class="mx-3 small text-muted text-uppercase" style="letter-spacing: 1px; font-size: 0.7rem;">Or join with</span>
                    <hr class="flex-grow-1 border-secondary opacity-25">
                </div>

                <div class="d-flex gap-3 mb-4">
                    <button type="button" class="btn btn-outline w-100 d-flex align-items-center justify-content-center gap-2 py-2">
                        <i class="fab fa-google"></i> Google
                    </button>
                    <button type="button" class="btn btn-outline w-100 d-flex align-items-center justify-content-center gap-2 py-2">
                        <i class="fab fa-apple"></i> Apple
                    </button>
                </div>
                
                <p class="text-center small text-muted">
                    Already registered? <a href="login.html" class="text-accent">Login</a>
                </p>
            </form>
        </div>
    </main>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/ScrollTrigger.min.js"></script>
    <script src="assets/js/main.js"></script>
    <script src="assets/js/theme-toggle.js"></script>
    <script src="assets/js/rtl-toggle.js"></script>
    <script src="assets/js/animations.js"></script>
</body>
</html>
