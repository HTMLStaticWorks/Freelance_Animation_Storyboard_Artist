<!DOCTYPE html>
<html lang="en" data-theme="dark">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | Storyboard Artist</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&family=Space+Grotesk:wght@700;800&display=swap"
        rel="stylesheet">

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link rel="stylesheet" href="assets/css/style.css">
<link rel="icon" type="image/svg+xml" href="assets/img/favicon.svg">
</head>

<body class="auth-page">


    <main class="auth-container">
        <div class="auth-card">
            <div class="text-center mb-4">
                <a href="index.html" class="logo"><i class="fas fa-clapperboard me-2"></i>ARTIST_X</a>
            </div>
            <h2 class="mb-4 text-center">STUDIO LOGIN</h2>
            <p class="text-muted mb-5 text-center">Enter your credentials to access the client review dashboard.</p>

            <form action="dashboard.html">
                <div class="form-group">
                    <label>Studio Email</label>
                    <input type="email" class="form-control" placeholder="name@studio.com" required>
                </div>
                <div class="form-group">
                    <label>Password</label>
                    <input type="password" class="form-control" placeholder="••••••••" required>
                </div>
                <div class="d-flex justify-content-between align-items-center mb-4">
                    <div class="form-check text-start">
                        <input class="form-check-input" type="checkbox" id="remember"
                            style="background-color: transparent; border-color: var(--border-color);">
                        <label class="form-check-label small text-muted ms-1" for="remember"
                            style="text-transform: none; cursor: pointer;">Remember me</label>
                    </div>
                    <a href="#" class="small text-accent">Forgot Password?</a>
                </div>
                <button type="submit" class="btn btn-primary w-100 mb-4">Sign In</button>

                <div class="divider d-flex align-items-center my-4">
                    <hr class="flex-grow-1 border-secondary opacity-25">
                    <span class="mx-3 small text-muted text-uppercase"
                        style="letter-spacing: 1px; font-size: 0.7rem;">Or continue with</span>
                    <hr class="flex-grow-1 border-secondary opacity-25">
                </div>

                <div class="d-flex gap-3 mb-4">
                    <button type="button"
                        class="btn btn-outline w-100 d-flex align-items-center justify-content-center gap-2 py-2">
                        <i class="fab fa-google"></i> Google
                    </button>
                    <button type="button"
                        class="btn btn-outline w-100 d-flex align-items-center justify-content-center gap-2 py-2">
                        <i class="fab fa-apple"></i> Apple
                    </button>
                </div>

                <p class="text-center small text-muted">
                    New studio? <a href="signup.html" class="text-accent">Request Access</a>
                </p>
            </form>
        </div>
    </main>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/ScrollTrigger.min.js"></script>
    <script src="assets/js/main.js"></script>
    <script src="assets/js/theme-toggle.js"></script>
    <script src="assets/js/rtl-toggle.js"></script>
    <script src="assets/js/animations.js"></script>
</body>

</html>
